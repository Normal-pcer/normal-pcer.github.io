<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="utf-8" />
        <meta content="IE=Edge" />
        <title> 404 Not Found </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1 style="font-size: 10em;">:)</h1>
        <h1> 宁是不是输入了什么不该输入的网址？ </h1>
        <h2> 即将在 <div id="time" style="display: inline-block;"></div> 秒内返回上一个界面 </h2>
        <script type="text/javascript">
            function newfunc(n)
            {
                if (n==0)
                    window.history.go(-1)
                div = document.getElementById("time")
                div.innerHTML = n
                setTimeout("newfunc("+(n-1)+")", 1000)
            }
            window.onload = newfunc(5)
        </script>
    </body>
</html>
