    <h1>WordCraft是什么？</h1>
    <p>WordCraft是一款创意来自<a href="https://minecraft.net/">Minecraft</a>的<b>开源</b>游戏。其将Minecraft中的所有元素都抽象成了文字。如“草方块”在Wordcraft中就显示为“草”（这可以在blocksconfig.json中更改）。</p>
